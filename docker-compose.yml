services:
  db:
    image: postgres:16-alpine
    container_name: rental-marketplace-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - dropoff_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rental-marketplace-redis
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.1.1
    container_name: rental-marketplace-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - dropoff_kafka_data:/var/lib/kafka/data
  
  
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: rental-marketplace-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: dropoff-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  backend:
    build:
      context: ./backend
    container_name: rental-marketplace-backend
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      - db
      - redis
      - mailpit
      - kafka
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: rental-marketplace-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: rental-marketplace-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      - db
    ports:
      - "5050:80"
    volumes:
      - dropoff_pgadmin_data:/var/lib/pgadmin

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: rental-marketplace-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"

volumes:
  dropoff_postgres_data:
  dropoff_pgadmin_data:
  dropoff_kafka_data: